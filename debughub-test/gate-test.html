<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DebugHub Gate Test</title>
<style>
  body {
    background: #080a0f;
    color: #e6e6e6;
    font-family: monospace;
    padding: 1.5rem;
    line-height: 1.6;
  }
  h1 { color: #00e5a0; font-size: 1.2rem; }
  button {
    display: block;
    width: 100%;
    margin: 0.6rem 0;
    padding: 0.8rem;
    background: #111722;
    color: #00e5a0;
    border: 1px solid #00e5a0;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.9rem;
  }
  #status {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 6px;
    border: 1px solid #333;
    background: #111722;
    font-size: 0.85rem;
    word-break: break-all;
  }
  .ok { border-color: #00e5a0; color: #00e5a0; }
  .no { border-color: #ff5555; color: #ff5555; }
  .wait { border-color: #888; color: #aaa; }
</style>
</head>
<body>

<h1>DebugHub Gate Test</h1>

<button onclick="DebugHubGate.connect({ onAuthorized: authorized, onUnauthorized: unauthorized, onNotConnected: notConnected })">
  Connect Wallet
</button>

<div id="status" class="wait">Checking connection...</div>

<script src="gate.js"></script>
<script>
  var statusEl = document.getElementById("status");

  function authorized(addr) {
    statusEl.className = "ok";
    statusEl.textContent = "✅ AUTHORIZED (owner)\nAddress: " + addr;
  }

  function unauthorized(addr) {
    statusEl.className = "no";
    statusEl.textContent = "❌ NOT AUTHORIZED\nConnected address: " + addr + "\n\nThis does not match the owner address.";
  }

  function notConnected(reason) {
    statusEl.className = "wait";
    if (reason === "no_wallet") {
      statusEl.textContent = "No wallet extension detected.";
    } else {
      statusEl.textContent = "Wallet not connected. Tap 'Connect Wallet' above.";
    }
  }

  // Silent check on page load
  DebugHubGate.init(authorized, unauthorized, notConnected);
</script>

</body>
</html>
