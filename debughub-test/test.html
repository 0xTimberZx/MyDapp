<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DebugHub SDK Test</title>
<style>
  body {
    background: #080a0f;
    color: #e6e6e6;
    font-family: monospace;
    padding: 1.5rem;
    line-height: 1.6;
  }
  h1 { color: #00e5a0; font-size: 1.2rem; }
  button {
    display: block;
    width: 100%;
    margin: 0.4rem 0;
    padding: 0.7rem;
    background: #111722;
    color: #00e5a0;
    border: 1px solid #00e5a0;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.9rem;
  }
  pre {
    background: #111722;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 0.8rem;
    overflow-x: auto;
    font-size: 0.75rem;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<h1>DebugHub SDK Test (App: TestApp)</h1>

<button onclick="DebugHub.startSession()">startSession()</button>
<button onclick="DebugHub.logCheckpoint('Page Loaded', 'pass')">logCheckpoint Page Loaded (pass)</button>
<button onclick="DebugHub.logCheckpoint('Wallet Connected', 'pass')">logCheckpoint Wallet Connected (pass)</button>
<button onclick="DebugHub.logError('claim', { code: -32002, message: 'Request already pending' })">logError (claim)</button>
<button onclick="DebugHub.logPerf('gasEstimate', 820)">logPerf gasEstimate (820ms)</button>
<button onclick="DebugHub.logSecurity('Chain Check', 'pass')">logSecurity Chain Check (pass)</button>
<button onclick="DebugHub.endSession()">endSession()</button>
<button onclick="showRaw()">Show Raw Stored Events</button>
<button onclick="clearAll()">Clear TestApp_sessions</button>

<h1>Stored Events (decoded)</h1>
<pre id="output">Click a button above to start.</pre>

<script>window.DEBUGHUB_CONFIG = { appName: "TestApp" };</script>
<script src="debugger.js"></script>
<script>
  function b64decode(str) {
    return decodeURIComponent(escape(atob(str)));
  }

  function showRaw() {
    var out = document.getElementById("output");
    try {
      var raw = localStorage.getItem("TestApp_sessions");
      if (!raw) {
        out.textContent = "(no data stored yet)";
        return;
      }
      var decoded = JSON.parse(b64decode(raw));
      out.textContent = JSON.stringify(decoded, null, 2);
    } catch (e) {
      out.textContent = "Error reading storage: " + e.message;
    }
  }

  function clearAll() {
    localStorage.removeItem("TestApp_sessions");
    document.getElementById("output").textContent = "Cleared.";
  }
</script>

</body>
</html>
